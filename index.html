<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Manager | WhatsApp Catalog</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1>WhatsApp Shop Manager</h1>
                <div class="header-actions">
                    <a href="/catalog.csv" class="btn-text" target="_blank">View Catalog CSV</a>
                    <button id="sync-btn" class="btn-secondary">Sync from CSV</button>
                    <button id="add-product-btn" class="btn-primary">Add New Item</button>
                </div>
            </div>
        </header>

        <main>
            <div id="product-grid" class="grid">
                <!-- Products will be loaded here -->
                <div class="loader">Loading catalog...</div>
            </div>
        </main>

        <!-- Product Form Modal -->
        <div id="product-modal" class="modal hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2 id="modal-title">Add Product</h2>
                    <span class="close-btn">&times;</span>
                </div>
                <form id="product-form">
                    <input type="hidden" id="product-id">
                    <div class="form-group">
                        <label for="title">Product Name</label>
                        <input type="text" id="title" name="title" required placeholder="e.g. Premium Cotton Shirt">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" required placeholder="Describe your product..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Price (ILS)</label>
                            <input type="number" id="price" name="price" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="availability">Availability</label>
                            <select id="availability" name="availability">
                                <option value="in stock">In Stock</option>
                                <option value="out of stock">Out of Stock</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <div id="image-preview" class="image-preview">
                            <span>No image selected</span>
                        </div>
                        <button type="button" id="upload-btn" class="btn-secondary">Upload Image</button>
                        <input type="hidden" id="image_link" name="image_link" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancel-btn" class="btn-text">Cancel</button>
                        <button type="submit" id="save-btn" class="btn-primary">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
